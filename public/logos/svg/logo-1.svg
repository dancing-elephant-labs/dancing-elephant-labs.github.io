<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    /* Trunk draw animation */
    .trunk {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw 2.5s ease forwards;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Node pulse animation */
    .node {
      transform-origin: center;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        r: 6;
        opacity: 1;
      }
      50% {
        r: 10;
        opacity: 0.6;
      }
    }

    /* Optional subtle line fade */
    .connection {
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeIn {
      to {
        opacity: 0.6;
      }
    }
  </style>

  <!-- Background -->
  <rect width="512" height="512" fill="#020617"/>

  <!-- Main D Shape -->
  <path d="M150 120 
           H240 
           C320 120 380 170 380 256 
           C380 342 320 392 240 392 
           H150 Z"
        fill="none"
        stroke="#93C5FD"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- E Bars -->
  <path d="M185 200 H255" stroke="#A5B4FC" stroke-width="16" stroke-linecap="round"/>
  <path d="M185 256 H240" stroke="#A5B4FC" stroke-width="16" stroke-linecap="round"/>
  <path d="M185 312 H255" stroke="#A5B4FC" stroke-width="16" stroke-linecap="round"/>

  <!-- Animated Trunk -->
  <path class="trunk"
        d="M310 200 
           C280 235 275 275 300 305 
           C315 325 295 350 255 370"
        fill="none"
        stroke="#22D3EE"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Pulsing Node -->
  <circle class="node" cx="315" cy="220" r="6" fill="#E2E8F0"/>

  <!-- Connection Line -->
  <path class="connection"
        d="M305 235 L255 256"
        stroke="#22D3EE"
        stroke-width="3"
        stroke-linecap="round"/>
</svg>